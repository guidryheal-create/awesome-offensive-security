name: Awesome Bot

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  awesomebot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'

      - name: Install awesome_bot
        run: gem install awesome_bot

      - name: Run awesome_bot
        run: |
          awesome_bot **/*.md \
          --allow-ssl \
          --allow 301,302,307,308,429,403,500,502 \
          --skip-save-results \
          --white-list \
          raw.githubusercontent.com,\
          github.com,\
          medium.com,\
          vulnu.com,\
          cybernews.com